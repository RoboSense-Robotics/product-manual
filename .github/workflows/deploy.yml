name: Deploy Docs
on:
  push:
    branches:
      - main # 当 main 分支有代码推送时触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - name: Install dependencies
        run: |
          pip install mkdocs-material
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Build with MkDocs
        env:
          FEEDBACK_API_URL: ${{ secrets.FEEDBACK_API_URL }}
        run: |
          if [ -n "$FEEDBACK_API_URL" ]; then
            sed -i "s|__FEEDBACK_API_URL__|${FEEDBACK_API_URL}|g" docs/javascripts/feedback-config.js
          fi
          mkdocs build # 编译出 site 文件夹
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site # 将编译好的静态文件目录上传给 GitHub Pages
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4