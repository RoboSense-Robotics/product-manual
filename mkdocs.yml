site_name: 公司产品手册
site_url: https://RoboSense-Robotics.github.io/product-manual/  # GitHub Pages 地址

# 片段仅通过 pymdownx.snippets 插入，不作为独立页面发布，避免相对路径误报
exclude_docs: |
  snippets/*

nav:
  - 首页: index.md
  - EM平台激光雷达:
    - EM4: EM4_CN.md
    - EMX: EMX_CN.md
  - E平台激光雷达:
    - E1R: E1R_CN.md
    - E1: E1_CN.md
  - R平台激光雷达:
    - Airy: Airy.md
    - Fairy (48T1): Fairy_CN_48T1.md
    - Fairy (48TX): Fairy_CN_48TX.md

theme:
  name: material
  language: zh          # 切换为中文界面
  palette:
    - scheme: default   # 日间模式
      primary: indigo
      accent: indigo
    - scheme: slate     # 夜间模式
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs   # 顶部导航栏模式（适合多手册分类）
    - navigation.top    # 回到顶部按钮
    - toc.follow        # 右侧目录随滚动高亮当前章节
    - search.suggest    # 搜索建议提示
    - search.highlight  # 搜索词高亮

# 开启内置全文搜索引擎
plugins:
  - search

# 核心配置：扩展 Markdown 语法以支持公式和图表
markdown_extensions:
  - admonition
  - pymdownx.details
  - md_in_html # <figure markdown> 内嵌图片与 <figcaption> 图题
  - attr_list
  - pymdownx.arithmatex: # 公式支持 (MathJax)
      generic: true
  - pymdownx.superfences: # 支持 Mermaid 图表代码块
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path:
        - docs
      check_paths: true
  - tables # 原生表格增强支持

extra_css:
  - stylesheets/extra.css

# MathJax 3
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
